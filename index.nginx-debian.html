<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to the VCF9 Chaos</title>
  <style>
    body {
      font-family: Comic Sans MS, cursive;
      background: linear-gradient(45deg, #24916F, #A1E3D3);
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 3em;
      color: #333;
    }
    .joke {
      margin: 20px;
      font-size: 1.5em;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
    }
    button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <h1>🐂 Welcome to My Totally Serious VCF9 Website 🚜</h1>

  <p class="joke">Loading productivity... please wait...... Failed please redeploy</p>

  <button onclick="tellJoke()">Click for a bad joke</button>

  <p id="output" class="joke"></p>

  <script>
    const jokes = [
      "I told my VCF deployment to be highly available… Now it refuses to go down even for maintenance. 😭",
      "Why did the Kubernetes pod break up?Because it couldn’t handle the clustered relationship.",
      "vRA user: This blueprint is simple. Reality: 17 inputs, 4 dependencies, and one mysterious failure.",
      "I would tell you a UDP joke… but you might not get it.",
      "My code doesn’t have bugs… it has unexpected features.",
      "VCF 9 marketing: Seamless automation. Engineer: Seamlessly failing in new and exciting ways. ✨"
    ];

    function tellJoke() {
      const random = Math.floor(Math.random() * jokes.length);
      document.getElementById("output").innerText = jokes[random];
    }
  </script>

  <footer style="margin-top:50px;">
    <p>© 2026 not a VCF 9 engineer</p>
  </footer>
</body>
</html>
